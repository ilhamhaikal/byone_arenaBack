# docker-compose.dev.yml
# Digunakan untuk development lokal dengan hot-reload
# Jalankan dengan: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Override API service untuk development
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: byone-arena-api-dev
    volumes:
      - .:/app
      - go_cache:/root/go/pkg/mod
    environment:
      APP_ENV: development
      LOG_LEVEL: debug

  # pgAdmin untuk manajemen database via browser
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: byone-arena-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@byone.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    networks:
      - byone-network
    depends_on:
      - postgres

volumes:
  go_cache:
    name: byone-arena-go-cache
