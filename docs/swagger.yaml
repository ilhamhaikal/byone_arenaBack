basePath: /
definitions:
  entity.Booking:
    properties:
      bookingDate:
        type: string
      console:
        $ref: '#/definitions/entity.Console'
      consoleId:
        type: string
      createdAt:
        type: string
      customer:
        $ref: '#/definitions/entity.Customer'
      customerId:
        type: string
      durationMinutes:
        type: integer
      id:
        type: string
      notes:
        type: string
      startHour:
        type: integer
      startMinute:
        type: integer
      status:
        $ref: '#/definitions/entity.BookingStatus'
      updatedAt:
        type: string
    type: object
  entity.BookingStatus:
    enum:
    - pending
    - confirmed
    - cancelled
    - completed
    type: string
    x-enum-varnames:
    - BookingPending
    - BookingConfirmed
    - BookingCancelled
    - BookingCompleted
  entity.Console:
    properties:
      adbPort:
        type: integer
      consoleType:
        $ref: '#/definitions/entity.ConsoleType'
      createdAt:
        type: string
      dailyPrice:
        type: number
      description:
        type: string
      id:
        type: string
      ipAddress:
        type: string
      lastSeenAt:
        type: string
      macAddress:
        type: string
      name:
        type: string
      pricePerHour:
        type: number
      pricingTiers:
        description: |-
          PricingTiers — tarif bertingkat (JSONB). Kosong/null = pakai pricePerHour flat.
          Format: [{"startMinute":0,"endMinute":60,"price":9000},{"startMinute":60,"endMinute":null,"price":8000}]
          startMinute: menit mulai tier (inklusif). endMinute: menit akhir (eksklusif), null=unlimited.
          price: harga per JAM untuk tier tersebut.
          Contoh di atas: jam pertama Rp 9000/jam, jam kedua dst Rp 8000/jam → 90 menit = Rp 9000 + Rp 4000 = Rp 13000
        items:
          $ref: '#/definitions/entity.PricingTierEntry'
        type: array
      screenStatus:
        $ref: '#/definitions/entity.ScreenStatus'
      status:
        $ref: '#/definitions/entity.ConsoleStatus'
      updatedAt:
        type: string
    type: object
  entity.ConsoleStatus:
    enum:
    - available
    - in_use
    - maintenance
    type: string
    x-enum-comments:
      ConsoleStatusAvailable: siap disewa / TV mati
      ConsoleStatusInUse: sedang aktif / TV menyala
      ConsoleStatusMaintenance: sedang diperbaiki
    x-enum-descriptions:
    - siap disewa / TV mati
    - sedang aktif / TV menyala
    - sedang diperbaiki
    x-enum-varnames:
    - ConsoleStatusAvailable
    - ConsoleStatusInUse
    - ConsoleStatusMaintenance
  entity.ConsoleType:
    enum:
    - PS3
    - PS4
    - PS5
    - AndroidTV
    - Switch
    type: string
    x-enum-varnames:
    - ConsoleTypePS3
    - ConsoleTypePS4
    - ConsoleTypePS5
    - ConsoleTypeAndroidTV
    - ConsoleTypeSwitch
  entity.Customer:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      isMember:
        type: boolean
      membershipExpiry:
        description: YYYY-MM-DD
        type: string
      membershipPrice:
        type: number
      membershipStart:
        description: YYYY-MM-DD
        type: string
      membershipType:
        description: Membership fields
        type: string
      name:
        type: string
      phone:
        type: string
      updatedAt:
        type: string
    type: object
  entity.DailyRental:
    properties:
      console:
        $ref: '#/definitions/entity.Console'
      consoleId:
        type: string
      createdAt:
        type: string
      customer:
        $ref: '#/definitions/entity.Customer'
      customerId:
        type: string
      dailyPrice:
        type: number
      discountAmount:
        type: number
      endDate:
        type: string
      finalAmount:
        type: number
      freeDaysUsed:
        type: integer
      id:
        type: string
      notes:
        type: string
      returnedAt:
        type: string
      startDate:
        type: string
      status:
        $ref: '#/definitions/entity.DailyRentalStatus'
      totalAmount:
        type: number
      totalDays:
        type: integer
      updatedAt:
        type: string
      voucherId:
        type: string
    type: object
  entity.DailyRentalStatus:
    enum:
    - active
    - returned
    - overdue
    type: string
    x-enum-varnames:
    - DailyRentalActive
    - DailyRentalReturned
    - DailyRentalOverdue
  entity.DashboardSummary:
    properties:
      activeSessions:
        type: integer
      availableConsoles:
        type: integer
      dailyRentalCount:
        type: integer
      dailyRentalRevenue:
        type: number
      date:
        type: string
      generatedAt:
        type: string
      membershipCount:
        type: integer
      membershipRevenue:
        type: number
      totalAutoDiscount:
        type: number
      totalBaseAmount:
        type: number
      totalCashReceived:
        type: number
      totalChange:
        type: number
      totalConsoles:
        type: integer
      totalDiscount:
        type: number
      totalRevenue:
        type: number
      totalTransactions:
        type: integer
      voucherDetails:
        items:
          $ref: '#/definitions/entity.VoucherUsageDetail'
        type: array
      voucherUsageCount:
        type: integer
    type: object
  entity.DiscountRule:
    properties:
      createdAt:
        type: string
      daysOfWeek:
        description: 'Day of week: comma-separated "0,1,2" (0=Minggu, 1=Senin, ...,
          6=Sabtu)'
        type: string
      discountType:
        allOf:
        - $ref: '#/definitions/entity.DiscountType'
        description: reuse dari voucher.go
      discountValue:
        type: number
      endHour:
        type: integer
      id:
        type: string
      isActive:
        type: boolean
      maxDiscount:
        description: batas maks diskon persen (0 = tidak terbatas)
        type: number
      minPurchase:
        description: minimal total sebelum rule berlaku
        type: number
      name:
        type: string
      priority:
        description: lebih besar = lebih dulu dievaluasi
        type: integer
      ruleType:
        $ref: '#/definitions/entity.RuleType'
      startHour:
        description: 'Happy hour: jam mulai dan jam selesai (0-23, bisa lintas tengah
          malam)'
        type: integer
      updatedAt:
        type: string
    type: object
  entity.DiscountType:
    enum:
    - percentage
    - fixed_amount
    - free_days
    type: string
    x-enum-comments:
      DiscountTypeFixedAmount: diskon nominal tetap
      DiscountTypeFreeDays: gratis N hari pada rental harian
      DiscountTypePercentage: diskon persen dari total
    x-enum-descriptions:
    - diskon persen dari total
    - diskon nominal tetap
    - gratis N hari pada rental harian
    x-enum-varnames:
    - DiscountTypePercentage
    - DiscountTypeFixedAmount
    - DiscountTypeFreeDays
  entity.FoodOrder:
    properties:
      createdAt:
        type: string
      customer:
        $ref: '#/definitions/entity.Customer'
      customerId:
        description: 'opsional: walk-in'
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/entity.FoodOrderItem'
        type: array
      notes:
        type: string
      orderNumber:
        type: string
      session:
        allOf:
        - $ref: '#/definitions/entity.Session'
        description: Relasi
      sessionId:
        description: 'opsional: terhubung ke sesi PS'
        type: string
      status:
        $ref: '#/definitions/entity.OrderStatus'
      totalAmount:
        type: number
      updatedAt:
        type: string
    type: object
  entity.FoodOrderItem:
    properties:
      createdAt:
        type: string
      id:
        type: string
      menuItem:
        allOf:
        - $ref: '#/definitions/entity.MenuItem'
        description: Relasi
      menuItemId:
        type: string
      notes:
        type: string
      orderId:
        type: string
      quantity:
        type: integer
      subtotal:
        description: quantity × unit_price
        type: number
      unitPrice:
        description: snapshot harga saat pesan
        type: number
    type: object
  entity.MenuItem:
    properties:
      category:
        $ref: '#/definitions/entity.MenuItemCategory'
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      isAvailable:
        type: boolean
      name:
        type: string
      price:
        type: number
      updatedAt:
        type: string
    type: object
  entity.MenuItemCategory:
    enum:
    - food
    - drink
    - snack
    - other
    type: string
    x-enum-varnames:
    - MenuCategoryFood
    - MenuCategoryDrink
    - MenuCategorySnack
    - MenuCategoryOther
  entity.NotificationPriority:
    enum:
    - low
    - normal
    - high
    type: string
    x-enum-varnames:
    - NotificationPriorityLow
    - NotificationPriorityNormal
    - NotificationPriorityHigh
  entity.OrderStatus:
    enum:
    - pending
    - preparing
    - served
    - cancelled
    type: string
    x-enum-comments:
      OrderStatusCancelled: dibatalkan
      OrderStatusPending: pesanan baru, menunggu diproses dapur
      OrderStatusPreparing: sedang diproses dapur
      OrderStatusServed: sudah diantarkan ke pelanggan
    x-enum-descriptions:
    - pesanan baru, menunggu diproses dapur
    - sedang diproses dapur
    - sudah diantarkan ke pelanggan
    - dibatalkan
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusPreparing
    - OrderStatusServed
    - OrderStatusCancelled
  entity.Payment:
    properties:
      amount:
        type: number
      autoDiscountAmount:
        description: diskon otomatis (happy hour, member, dll)
        type: number
      cashReceived:
        description: uang yang diterima
        type: number
      changeAmount:
        description: kembalian
        type: number
      createdAt:
        type: string
      discountAmount:
        description: nominal diskon yang diberikan
        type: number
      id:
        type: string
      notes:
        type: string
      paidAt:
        type: string
      paymentMethod:
        $ref: '#/definitions/entity.PaymentMethod'
      paymentStatus:
        $ref: '#/definitions/entity.PaymentStatus'
      session:
        allOf:
        - $ref: '#/definitions/entity.Session'
        description: Relasi
      sessionId:
        type: string
      totalPayment:
        description: jumlah final dibayar = amount - discount - auto_discount
        type: number
      updatedAt:
        type: string
      voucher:
        $ref: '#/definitions/entity.Voucher'
      voucherId:
        type: string
    type: object
  entity.PaymentMethod:
    enum:
    - cash
    type: string
    x-enum-varnames:
    - PaymentMethodCash
  entity.PaymentStatus:
    enum:
    - pending
    - paid
    - refunded
    type: string
    x-enum-varnames:
    - PaymentStatusPending
    - PaymentStatusPaid
    - PaymentStatusRefunded
  entity.PricingTierEntry:
    properties:
      endMinute:
        description: menit akhir tier (eksklusif), null = unlimited
        type: integer
      price:
        description: harga per jam untuk tier ini
        type: number
      startMinute:
        description: menit mulai tier (inklusif)
        type: integer
    type: object
  entity.ReportConsoleUsage:
    properties:
      consoleName:
        type: string
      consoleType:
        type: string
      totalMinutes:
        type: integer
      totalSessions:
        type: integer
    type: object
  entity.ReportDailyItem:
    properties:
      date:
        type: string
      playMinutes:
        type: integer
      revenue:
