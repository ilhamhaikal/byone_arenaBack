      status:
        $ref: '#/definitions/entity.ShiftStatus'
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: Relasi (join data)
      userId:
        type: string
    type: object
  entity.ShiftStatus:
    enum:
    - active
    - inactive
    type: string
    x-enum-varnames:
    - ShiftStatusActive
    - ShiftStatusInactive
  entity.TvNotification:
    properties:
      activeSessionsOnly:
        description: hanya TV dengan sesi aktif
        type: boolean
      consoleIds:
        description: Field transient — untuk input/output API
        items:
          type: string
        type: array
      createdAt:
