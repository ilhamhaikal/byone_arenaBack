  entity.UserRole:
    enum:
    - superadmin
    - admin
    - kasir
    type: string
    x-enum-varnames:
    - UserRoleSuperAdmin
    - UserRoleAdmin
    - UserRoleKasir
  entity.Voucher:
    properties:
      code:
