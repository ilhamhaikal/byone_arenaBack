      id:
        type: string
      isActive:
        type: boolean
      maxDiscount:
        description: batas maks diskon persen (0 = tidak terbatas)
        type: number
      maxUsage:
        description: batas total pemakaian (0 = tidak terbatas)
        type: integer
      minPurchase:
        description: minimal total sebelum voucher berlaku
        type: number
      name:
        type: string
      updatedAt:
        type: string
      usageCount:
        type: integer
    type: object
  entity.VoucherUsageDetail:
    properties:
      totalDiscount:
        type: number
      usageCount:
        type: integer
      voucherCode:
        type: string
      voucherName:
        type: string
    type: object
  handler.ActivityItem:
    properties:
      action:
        type: string
      detail:
        type: string
      timestamp:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  handler.ExtendSessionRequest:
    properties:
      additionalMinutes:
        example: 120
        minimum: 1
        type: integer
      cashReceived:
        description: wajib jika payNow=true
        example: 50000
        minimum: 0
        type: number
      notes:
        example: Tambah 2 jam
        type: string
      payNow:
        description: true = langsung bayar, false = tunda bayar
        example: true
        type: boolean
      voucherCode:
        example: ""
        type: string
    required:
    - additionalMinutes
    type: object
  response.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  response.Response:
    properties:
