        type: number
      usageCount:
        type: integer
      voucherCode:
        type: string
      voucherName:
        type: string
    type: object
  entity.RuleType:
    enum:
    - always
    - happy_hour
    - member
    - day_of_week
    type: string
    x-enum-comments:
      RuleTypeAlways: berlaku untuk semua transaksi
      RuleTypeDayOfWeek: berlaku pada hari tertentu
      RuleTypeHappyHour: berlaku pada jam tertentu
      RuleTypeMember: khusus pelanggan member
    x-enum-descriptions:
    - berlaku untuk semua transaksi
    - berlaku pada jam tertentu
    - khusus pelanggan member
    - berlaku pada hari tertentu
    x-enum-varnames:
    - RuleTypeAlways
    - RuleTypeHappyHour
    - RuleTypeMember
    - RuleTypeDayOfWeek
  entity.ScreenStatus:
    enum:
    - "on"
    - "off"
    - screensaver
    type: string
    x-enum-varnames:
    - ScreenStatusOn
    - ScreenStatusOff
    - ScreenStatusScreensaver
  entity.Session:
    properties:
      bookedDurationMinutes:
        description: 'BookedDurationMinutes adalah durasi yang dipesan di awal (contoh:
          120 menit = 2 jam)'
        type: integer
      console:
        allOf:
        - $ref: '#/definitions/entity.Console'
        description: Relasi (join data)
      consoleId:
        type: string
      createdAt:
        type: string
      customer:
        $ref: '#/definitions/entity.Customer'
      customerId:
        description: nullable, walk-in
        type: string
      durationMinutes:
        type: integer
      endScheduledAt:
        description: EndScheduledAt adalah waktu selesai yang direncanakan (StartTime
          + BookedDurationMinutes)
        type: string
      endTime:
        type: string
      id:
        type: string
      notes:
        type: string
      startTime:
        type: string
      status:
        $ref: '#/definitions/entity.SessionStatus'
      totalPrice:
        type: number
      updatedAt:
        type: string
