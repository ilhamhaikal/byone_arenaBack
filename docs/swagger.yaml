  /api/v1/vouchers:
    get:
      description: Mengembalikan daftar seluruh voucher diskon beserta status dan
        statistik penggunaan
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Voucher'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Hanya admin dan superadmin
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ambil semua voucher
      tags:
      - Voucher
    post:
      consumes:
      - application/json
      description: Membuat voucher diskon baru.\n\n**Nilai discountType yang valid:**\n-
        `percentage` — diskon persen dari total (discountValue = 0–100)\n- `fixed_amount`
        — diskon nominal Rp tetap\n- `free_days` — gratis N hari untuk rental harian
        (discountValue = jumlah hari)\n\n**Format expiresAt:** RFC3339/ISO8601, contoh
        `2026-06-26T00:00:00Z`. Kirim `null` jika tidak ada batas waktu.\n\nKode otomatis
        diubah ke UPPERCASE.
      parameters:
      - description: Data voucher baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreateVoucherRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/entity.Voucher'
              type: object
        "400":
          description: Validasi gagal — cek discountType (percentage|fixed_amount)
            dan format expiresAt (RFC3339)
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Hanya admin atau superadmin
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buat voucher baru
      tags:
      - Voucher
