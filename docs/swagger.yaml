        type: string
      endScheduledAt:
        type: string
      id:
        type: string
      notes:
        type: string
      remainingMinutes:
        description: -1 = open-ended
        type: integer
      startTime:
        type: string
    type: object
  usecase.ConsoleOverviewItem:
    properties:
      activeSession:
        $ref: '#/definitions/usecase.ActiveSessionInfo'
      adbPort:
        type: integer
      consoleType:
        $ref: '#/definitions/entity.ConsoleType'
      createdAt:
        type: string
      dailyPrice:
        type: number
      description:
        type: string
      id:
        type: string
      ipAddress:
        type: string
      lastSeenAt:
        type: string
      macAddress:
        type: string
      name:
        type: string
      pricePerHour:
        type: number
      pricingTiers:
        description: |-
          PricingTiers — tarif bertingkat (JSONB). Kosong/null = pakai pricePerHour flat.
          Format: [{"startMinute":0,"endMinute":60,"price":9000},{"startMinute":60,"endMinute":null,"price":8000}]
          startMinute: menit mulai tier (inklusif). endMinute: menit akhir (eksklusif), null=unlimited.
          price: harga per JAM untuk tier tersebut.
          Contoh di atas: jam pertama Rp 9000/jam, jam kedua dst Rp 8000/jam → 90 menit = Rp 9000 + Rp 4000 = Rp 13000
        items:
          $ref: '#/definitions/entity.PricingTierEntry'
        type: array
      screenStatus:
        $ref: '#/definitions/entity.ScreenStatus'
      status:
        $ref: '#/definitions/entity.ConsoleStatus'
      updatedAt:
        type: string
    type: object
  usecase.CreateCashPaymentRequest:
    properties:
      cashReceived:
        type: number
      notes:
        type: string
      sessionId:
        type: string
      voucherCode:
        description: opsional — kode diskon voucher
        type: string
    required:
    - cashReceived
    - sessionId
    type: object
  usecase.CreateConsoleRequest:
    type: object
  usecase.CreateCustomerRequest:
    properties:
      email:
        type: string
      isMember:
        type: boolean
      membershipExpiry:
        type: string
      membershipPrice:
        type: number
      membershipStart:
        type: string
      membershipType:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        minLength: 8
        type: string
    required:
    - name
    - phone
    type: object
  usecase.CreateDiscountRuleRequest:
    properties:
      daysOfWeek:
        description: wajib jika rule_type=day_of_week, format "0,1,2"
        type: string
      discountType:
        allOf:
        - $ref: '#/definitions/entity.DiscountType'
