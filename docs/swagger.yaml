  entity.ReportRevenue:
    properties:
      autoDiscount:
        type: number
      dailyRentalCount:
        type: integer
      dailyRentalRevenue:
        type: number
      membershipCount:
        type: integer
      membershipRevenue:
        type: number
      totalBaseAmount:
        type: number
      totalCashReceived:
        type: number
      totalChange:
        type: number
      totalDiscount:
        type: number
      totalRevenue:
        type: number
      voucherDiscount:
