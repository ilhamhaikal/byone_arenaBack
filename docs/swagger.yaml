  /api/v1/sessions/start:
    post:
      consumes:
      - application/json
      description: Memulai sesi rental untuk konsol dan langsung menyelesaikan pembayaran
        di depan dalam satu transaksi.\n\n**Alur:**\n1. Konsol harus berstatus `available`\n2.
        Harga dihitung dari `bookedDurationMinutes × pricePerHour / 60`\n3. Diskon
        otomatis (happy hour, member) diterapkan\n4. Voucher opsional diterapkan jika
        `voucherCode` diberikan\n5. `cashReceived` harus ≥ harga setelah diskon\n\nResponse
        mencakup `session` (dengan `endScheduledAt` untuk countdown) dan `payment`
        (dengan `changeAmount` kembalian).\n\nEvent realtime `session_started` dikirim
        ke semua client WebSocket.
      parameters:
      - description: Data sesi dan pembayaran
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.StartSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/usecase.StartSessionResponse'
              type: object
